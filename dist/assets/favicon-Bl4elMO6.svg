<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1b1042"/>
      <stop offset="55%" stop-color="#0d0824"/>
      <stop offset="100%" stop-color="#020109"/>
    </radialGradient>

    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="devGlow" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#c9bfff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c9bfff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="devBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a48bff"/>
      <stop offset="100%" stop-color="#5a3fd6"/>
    </linearGradient>

    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9dfaff"/>
      <stop offset="100%" stop-color="#4fd8e8"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bgGlow)"/>

  <!-- distant stars -->
  <g fill="#ffffff">
    <circle cx="70" cy="90" r="2.4" opacity="0.9"/>
    <circle cx="120" cy="150" r="1.6" opacity="0.7"/>
    <circle cx="60" cy="260" r="1.8" opacity="0.8"/>
    <circle cx="90" cy="400" r="2.2" opacity="0.85"/>
    <circle cx="180" cy="440" r="1.5" opacity="0.6"/>
    <circle cx="430" cy="80" r="2" opacity="0.8"/>
    <circle cx="460" cy="150" r="1.6" opacity="0.7"/>
    <circle cx="440" cy="330" r="2.4" opacity="0.9"/>
    <circle cx="400" cy="420" r="1.8" opacity="0.75"/>
    <circle cx="250" cy="60" r="1.6" opacity="0.7"/>
    <circle cx="330" cy="440" r="1.4" opacity="0.6"/>
    <circle cx="150" cy="70" r="1.3" opacity="0.6"/>
  </g>

  <!-- a couple of bigger glowing stars -->
  <circle cx="410" cy="110" r="14" fill="url(#starGlow)"/>
  <circle cx="410" cy="110" r="3.5" fill="#ffffff"/>

  <circle cx="100" cy="380" r="10" fill="url(#starGlow)"/>
  <circle cx="100" cy="380" r="2.5" fill="#ffffff"/>

  <!-- soft glow behind the developer -->
  <circle cx="256" cy="256" r="220" fill="url(#devGlow)"/>

  <!-- floating platform / orbit ring under the developer -->
  <ellipse cx="256" cy="460" rx="210" ry="20" fill="#5a3fd6" opacity="0.25"/>

  <!-- developer: sitting cross-legged, laptop on lap, scaled up to fill the icon -->
  <g transform="translate(256 256) scale(1.55) translate(-256 -256)">
    <!-- head -->
    <circle cx="256" cy="188" r="34" fill="url(#devBody)"/>

    <!-- neck -->
    <rect x="246" y="216" width="20" height="14" fill="url(#devBody)"/>

    <!-- torso / hoodie -->
    <path d="M190 320
             C190 260 214 232 256 232
             C298 232 322 260 322 320
             L322 336
             C322 344 314 350 305 350
             L207 350
             C198 350 190 344 190 336
             Z" fill="url(#devBody)"/>

    <!-- crossed legs -->
    <path d="M170 372
             C170 346 210 336 256 336
             C302 336 342 346 342 372
             C342 388 300 392 256 392
             C212 392 170 388 170 372Z" fill="#432b9e"/>

    <!-- arms reaching to laptop -->
    <path d="M206 268 C196 292 200 316 222 328" stroke="url(#devBody)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M306 268 C316 292 312 316 290 328" stroke="url(#devBody)" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- laptop base -->
    <path d="M214 330 L298 330 L308 352 L204 352 Z" fill="#241164"/>
    <!-- laptop screen -->
    <path d="M220 330 L292 330 L286 292 L226 292 Z" fill="#1b1042"/>
    <path d="M226 296 L286 296 L281 322 L231 322 Z" fill="url(#screenGlow)" opacity="0.9"/>

    <!-- little code lines glowing on screen -->
    <rect x="235" y="301" width="20" height="3" rx="1.5" fill="#0d0824" opacity="0.6"/>
    <rect x="235" y="308" width="32" height="3" rx="1.5" fill="#0d0824" opacity="0.6"/>
    <rect x="235" y="315" width="14" height="3" rx="1.5" fill="#0d0824" opacity="0.6"/>
  </g>

  <!-- tiny stars caught in the developer's glow, for depth -->
  <circle cx="150" cy="150" r="1.6" fill="#ffffff" opacity="0.8"/>
  <circle cx="370" cy="140" r="1.8" fill="#ffffff" opacity="0.8"/>
  <circle cx="385" cy="240" r="1.4" fill="#ffffff" opacity="0.7"/>
</svg>
